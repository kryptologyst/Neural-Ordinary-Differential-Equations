# @package data

_target_: src.data.synthetic_datasets.SyntheticSineDataset

# Dataset parameters
n_samples: 1000
time_range: [0.0, 25.0]
noise_level: 0.1
function_type: "sine"  # sine, cosine, polynomial, exponential

# Data splits
train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

# Data loading
batch_size: 32
num_workers: 4
pin_memory: true
