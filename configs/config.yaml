# @package _global_

defaults:
  - _self_
  - data: synthetic_sine
  - model: neural_ode_basic
  - training: default
  - evaluation: continuous_time

# Experiment settings
experiment_name: "neural_ode_experiment"
seed: 42
device: auto  # auto, cpu, cuda, mps

# Paths
data_dir: "data"
output_dir: "outputs"
checkpoint_dir: "checkpoints"
log_dir: "logs"

# Logging
log_level: "INFO"
use_tensorboard: true
use_wandb: false

# Safety and ethics
safety_disclaimer: true
production_warning: true
